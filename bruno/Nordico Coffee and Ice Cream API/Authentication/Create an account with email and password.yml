info:
  name: Create an account with email and password
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/auth/sign-up/email"
  headers:
    - name: accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: " http://localhost:3000"
  body:
    type: json
    data: |-
      {
        "email": "testuser23@email.com",
        "name": "testUser_23",
        "password": "23UserTest",
        "rememberMe": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Account created successfully.
    request:
      url: "{{baseUrl}}/auth/sign-up/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "name": "",
            "password": "",
            "callbackURL": "",
            "image": "",
            "rememberMe": false
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Request payload is missing or invalid.
    request:
      url: "{{baseUrl}}/auth/sign-up/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "name": "",
            "password": "",
            "callbackURL": "",
            "image": "",
            "rememberMe": false
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 409 Response
    description: A user with the same email already exists.
    request:
      url: "{{baseUrl}}/auth/sign-up/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "name": "",
            "password": "",
            "callbackURL": "",
            "image": "",
            "rememberMe": false
          }
    response:
      status: 409
      statusText: Conflict
      body:
        type: text
        data: ""
  - name: 429 Response
    description: Too many requests. Please try again later.
    request:
      url: "{{baseUrl}}/auth/sign-up/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "name": "",
            "password": "",
            "callbackURL": "",
            "image": "",
            "rememberMe": false
          }
    response:
      status: 429
      statusText: Too Many Requests
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal server error.
    request:
      url: "{{baseUrl}}/auth/sign-up/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "name": "",
            "password": "",
            "callbackURL": "",
            "image": "",
            "rememberMe": false
          }
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: Registers a new user and returns a session result from Better Auth.
