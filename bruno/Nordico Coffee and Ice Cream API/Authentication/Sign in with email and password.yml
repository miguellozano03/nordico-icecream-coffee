info:
  name: Sign in with email and password
  type: http
  seq: 2
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/auth/sign-in/email"
  headers:
    - name: Origin
      value: " http://localhost:3000"
  body:
    type: json
    data: |-
      {
        "email": "testuser23@email.com",
        "password": "23UserTest",
        "rememberMe": false
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        bru.setEnvVar("token", body.token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Authentication succeeded.
    request:
      url: "{{baseUrl}}/auth/sign-in/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": "",
            "callbackURL": "",
            "rememberMe": false
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Request payload is missing or invalid.
    request:
      url: "{{baseUrl}}/auth/sign-in/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": "",
            "callbackURL": "",
            "rememberMe": false
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 429 Response
    description: Too many requests. Please try again later.
    request:
      url: "{{baseUrl}}/auth/sign-in/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": "",
            "callbackURL": "",
            "rememberMe": false
          }
    response:
      status: 429
      statusText: Too Many Requests
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal server error.
    request:
      url: "{{baseUrl}}/auth/sign-in/email"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": "",
            "callbackURL": "",
            "rememberMe": false
          }
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: Authenticates a user and returns an auth session response.
