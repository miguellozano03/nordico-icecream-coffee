info:
  name: Revoke a session
  type: http
  seq: 3
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/auth/revoke-session"
  headers:
    - name: Accept
      value: application/json
    - name: Origin
      value: http://localhost:3000
  body:
    type: json
    data: |-
      {
        "token": "{{token}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Session revoked successfully.
    request:
      url: "{{baseUrl}}/auth/revoke-session"
      method: POST
      body:
        type: json
        data: |-
          {
            "token": ""
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Request payload is missing or invalid.
    request:
      url: "{{baseUrl}}/auth/revoke-session"
