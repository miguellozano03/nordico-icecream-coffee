info:
  name: Update a product
  type: http
  seq: 3
  tags:
    - Products

http:
  method: PATCH
  url: "{{baseUrl}}/products/:id"
  params:
    - name: ""
      value: ""
      type: query
    - name: id
      value: 909c01e1-388c-4851-8d76-444aebd75388
      type: path
  body:
    type: multipart-form
    data:
      - name: image
        type: file
        value:
          - C:\Users\Miguel Lozano\Downloads\coke.webp
        contentType: image/webp
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

