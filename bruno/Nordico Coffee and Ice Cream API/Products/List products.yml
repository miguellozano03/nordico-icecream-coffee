info:
  name: List products
  type: http
  seq: 1
  tags:
    - Products

http:
  method: GET
  url: "{{baseUrl}}/products"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: search
      value: ""
      type: query
      disabled: true
    - name: categoryId
      value: ""
      type: query
      disabled: true
    - name: sortBy
      value: price
      type: query
      disabled: true
    - name: sortBy
      value: title
      type: query
      disabled: true
    - name: orderBy
      value: asc
      type: query
      disabled: true
    - name: orderBy
      value: desc
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
