info:
  name: Create a product
  type: http
  seq: 2
  tags:
    - Products

http:
  method: POST
  url: "{{baseUrl}}/products"
  body:
    type: multipart-form
    data:
      - name: categoryId
        type: text
        value: 60f2ce4c-6f31-498f-973c-9ce1aff647df
      - name: description
        type: text
        value: Our masterpiece. A double scoop of our signature sea-salt artisan vanilla ice cream, drowned in a freshly pulled shot of hot espresso.
      - name: price
        type: text
        value: "6"
      - name: title
        type: text
        value: The Nordico Affogato
      - name: image
        type: file
        value:
          - C:\Workspace\Programming\side_project\nordico-icecream-coffee\frontend\public\affogato.webp
        contentType: image/webp
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Product created successfully.
    request:
      url: "{{baseUrl}}/products"
      method: POST
      body:
        type: json
        data: |-
          {
            "categoryId": "",
            "title": "",
            "description": "",
            "price": 0
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "categoryId": "",
            "title": "",
            "description": "",
            "price": 0,
            "image": "",
            "category": {
              "id": "",
              "name": ""
            }
          }
  - name: 400 Response
    description: Request payload is missing or invalid.
    request:
      url: "{{baseUrl}}/products"
      method: POST
      body:
        type: json
        data: |-
          {
            "categoryId": "",
            "title": "",
            "description": "",
            "price": 0
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized.
    request:
      url: "{{baseUrl}}/products"
      method: POST
      body:
        type: json
        data: |-
          {
            "categoryId": "",
            "title": "",
            "description": "",
            "price": 0
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal server error.
    request:
      url: "{{baseUrl}}/products"
      method: POST
      body:
        type: json
        data: |-
          {
            "categoryId": "",
            "title": "",
            "description": "",
            "price": 0
          }
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: Creates a new product and optionally uploads an image.
