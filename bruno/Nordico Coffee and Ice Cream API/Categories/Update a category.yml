info:
  name: Update a category
  type: http
  seq: 3
  tags:
    - Categories

http:
  method: PATCH
  url: "{{baseUrl}}/categories/:id"
  params:
    - name: id
      value: 60f2ce4c-6f31-498f-973c-9ce1aff647df
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Ice creams"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

