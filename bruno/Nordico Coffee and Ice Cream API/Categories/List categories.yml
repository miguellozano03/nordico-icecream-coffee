info:
  name: List categories
  type: http
  seq: 1
  tags:
    - Categories

http:
  method: GET
  url: "{{baseUrl}}/categories"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Categories retrieved successfully.
    request:
      url: "{{baseUrl}}/categories"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "name": ""
            }
          ]
  - name: 500 Response
    description: Internal server error.
    request:
      url: "{{baseUrl}}/categories"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: Returns all available menu categories sorted by name.
